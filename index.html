<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>大学生生存模拟器</title>

<style>
body {
    background: #0f1115;
    color: white;
    font-family: Arial;
}

#container {
    display: flex;
    gap: 20px;
}

.panel {
    background: #1c1f26;
    padding: 15px;
    border-radius: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
}

button:hover {
    background: #444;
}

#log {
    height: 200px;
    overflow-y: auto;
    background: #111;
    padding: 10px;
}
</style>

</head>

<body>

<h1>🎮 大学生生存模拟器</h1>

<div id="container">

<!-- 状态栏 -->
<div class="panel">
<h3>📊 状态</h3>
HP: <span id="hp"></span><br>
精神: <span id="mental"></span><br>
金钱: <span id="money"></span><br>
压力: <span id="pressure"></span><br>
</div>

<!-- 操作区 -->
<div class="panel">
<h3>🎯 行动</h3>

<button onclick="playClick();Module._dormitory()">🏠 宿舍</button>
<button onclick="playStudy();study()">📚 学习</button>
<button onclick="playClick();Module._playground()">🏃 操场</button>
<button onclick="playWork();Module._outside()">💼 打工</button>

<br><br>

<select id="course">
<option value="0">微积分</option>
<option value="1">模电</option>
<option value="2">大物</option>
<option value="3">数据结构</option>
<option value="4">英语</option>
</select>

</div>

<!-- 日志 -->
<div class="panel" style="width:300px;">
<h3>📜 日志</h3>
<div id="log"></div>
</div>

</div>



<script>
/* ================= UI ================= */

function addLog(text){
    const log = document.getElementById("log");
    log.innerHTML += text + "<br>";
    log.scrollTop = log.scrollHeight;
}

function refreshUI(){
    document.getElementById("hp").innerText = Module._getHP();
    document.getElementById("mental").innerText = Module._getMental();
    document.getElementById("money").innerText = Module._getMoney();
    document.getElementById("pressure").innerText = Module._getPressure();
}

/* ================= 音效系统 ================= */

const clickSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3");
const studySound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-pencil-writing-on-paper-1210.mp3");
const workSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-coins-handling-1939.mp3");

/* 防止浏览器限制 */
function playClick(){
    clickSound.currentTime = 0;
    clickSound.play();
}

function playStudy(){
    studySound.currentTime = 0;
    studySound.play();
}

function playWork(){
    workSound.currentTime = 0;
    workSound.play();
}

/* ================= 学习接口 ================= */

function study(){
    let c = document.getElementById("course").value;
    Module._library(c);
    playStudy();
}

/* ================= WASM挂载 ================= */

var Module = {
    onRuntimeInitialized: function(){
        Module._initGame();
        refreshUI();
        addLog("🎮 游戏开始");
    }
};
</script>
<script src="game.js"></script>
</body>
</html>
